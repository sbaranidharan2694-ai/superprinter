    <!-- Charset + viewport first so they sit comfortably inside the first
         1024 bytes of the document. Lighthouse flags the page if the
         charset declaration appears past that threshold (HTML spec requires
         it before any byte that could trigger a re-decode). The GA4 loader
         script below is ~1000 bytes on its own — putting it before charset
         pushed the meta tag right to the byte-1000 boundary and tripped
         the audit even though the browser handled it fine. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

         thread for LCP. Re-introduces tracking without blocking render. -->

        function loadGA() {
          if (loaded) return; loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          window.gtag = function () { dataLayer.push(arguments); };
          gtag('js', new Date());
          gtag('config', GA_ID, { send_page_view: true });
        }
        ['click', 'touchstart', 'keydown', 'scroll'].forEach(function (e) {
          window.addEventListener(e, loadGA, { once: true, passive: true });
        });
        setTimeout(loadGA, 3000);
      })();
    </script>

    <!-- Maximize SERP snippet richness — large image previews, full text
         snippets, no length cap on video previews. Without these Google
         defaults to short snippets, which hurts CTR for long-tail "near me"
         queries where the address line needs to fit in the preview. -->
    <!-- The robots indexing directive is emitted by SEOHead.tsx via
         Helmet, so per-page overrides (e.g. /orders sends a noindex
         value) replace cleanly instead of producing duplicate tags
         in the prerendered HTML. The default emitted includes the
         max-snippet / max-image-preview / max-video-preview SERP

    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!--ssg-head-->

    <!-- LCP preloads. One file per preload: a single `<link rel="preload">`
         with multi-format `imagesrcset` is NOT supported the way it is for
         `<img srcset>`. Chrome honours the `type` attribute, discards the
         preload on devices that can't decode that format, and re-fetches
         from `<picture>` — adding ~1 RTT to LCP. We emit one AVIF
         preload; the `<picture>` element handles WebP/JPG fallback for
         the small minority of browsers without AVIF. -->
    <link rel="preload" as="image" href="/images/hero/wedding.avif" type="image/avif" fetchpriority="high" />
    <link rel="preload" as="image" href="/super-printers-logo.webp" type="image/webp" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Critical font split (May 2026 CWV pass):
         Tier 1 (above-fold, blocking) — Playfair Display 700 (the H1).
         Tier 2 (below-fold + body, deferred) — DM Sans, Poppins, the rest
         of Playfair weights, Noto Sans Tamil 400. Tier 2 swaps in async
         via `onload` so the H1 paints with its real font on the first
         frame while everything else streams in without blocking LCP. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,800;0,900;1,700&family=DM+Sans:wght@400;500;700&family=Poppins:wght@600;700&family=Noto+Sans+Tamil:wght@400&display=swap" onload="this.onload=null;this.rel='stylesheet'" media="print" onload="this.media='all'" />

         developers.google.com/search/docs/appearance/favicon-in-search). The

    <link rel="icon" href="/favicon.ico" sizes="any" />
